<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Express Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
}

.header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: black;
    color: white;
    cursor: pointer;
}

.status {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    font-weight: bold;
}

.hold {
    background: #fff3cd;
    color: #856404;
}

.success {
    background: #d4edda;
    color: #155724;
}

.admin {
    display: none;
    margin-top: 40px;
}
</style>
</head>

<body>

<div class="header">📦 Global Express Tracking</div>

<div class="container">

<div class="card">
<h3>Track Your Package</h3>

<input type="text" id="trackInput" placeholder="Enter Tracking Number">
<button onclick="track()">Track</button>

<div id="result"></div>
</div>

<!-- ADMIN PANEL (HIDDEN) -->
<div class="card admin" id="adminPanel">
<h3>Admin Panel</h3>

<input type="text" id="adminCode" placeholder="Tracking Number">
<select id="status">
<option value="On Hold">On Hold</option>
<option value="In Transit">In Transit</option>
<option value="Delivered">Delivered</option>
</select>

<input type="text" id="location" placeholder="Location">
<input type="text" id="fee" placeholder="Outstanding Fee ($)">

<button onclick="update()">Update</button>
</div>

</div>

<script>

// DEFAULT DATA
let data = {
"GXE777888": {
status: "On Hold",
location: "Abuja International Airport",
fee: "100"
}
};

// TRACK FUNCTION
function track() {
let code = document.getElementById("trackInput").value;
let result = document.getElementById("result");

if(data[code]) {
let d = data[code];

if(d.status === "On Hold") {
result.innerHTML = `
<div class="status hold">
📦 Package on HOLD at ${d.location}<br><br>
⚠ Outstanding Fee: $${d.fee}<br><br>
Please complete payment for release.
</div>`;
} else {
result.innerHTML = `
<div class="status success">
✅ Status: ${d.status}<br>
📍 Location: ${d.location}
</div>`;
}

} else {
result.innerHTML = "❌ Invalid Tracking Number";
}
}

// ADMIN UPDATE
function update() {
let code = document.getElementById("adminCode").value;
let status = document.getElementById("status").value;
let location = document.getElementById("location").value;
let fee = document.getElementById("fee").value;

data[code] = {status, location, fee};

alert("Updated!");
}

// SECRET ADMIN ACCESS
let secret = "";
document.addEventListener("keydown", function(e) {
secret += e.key;

if(secret.includes("admin123")) {
document.getElementById("adminPanel").style.display = "block";
alert("Admin Panel Opened");
secret = "";
}
});

</script>

</body>
</html>
