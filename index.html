<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Package</title>

<style>
body { font-family: Arial; background:#f5f5f5; }
.container { padding:20px; }
.card {
  background:white;
  padding:20px;
  border-radius:10px;
}
input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
}
button {
  background:black;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">
<h2>Track Your Package</h2>

<input id="code" placeholder="Enter Tracking Number">
<button onclick="go()">Track</button>

</div>
</div>

<script>
function go(){
let code = document.getElementById("code").value;
window.location.href = "track.html?code=" + code;
}
</script>

</body>
</html>
